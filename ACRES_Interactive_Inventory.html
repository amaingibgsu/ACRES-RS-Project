rt) linked to management practices and feed sites.","Measures cover of non‑native invasive species (e.g. Cotoneaster, Traveller’s‑joy, Red Valerian) within the winterage.","Ecological & site integrity: typical flora retained and absence of damaging activities.","Assesses whether typical winterage plant communities are retained or significantly modified by management or nutrients.","Records evidence and severity of damaging activities to habitat, vegetation or archaeology (e.g. burning, quarrying, boundary damage).","Assesses ecological health of semi-natural grasslands by measuring the\u003cbr\u003eabundance of indicator wildflowers and sward structure (height\u002ftussocks).\u003cbr\u003eIdentifies threats like overgrazing, invasive species, or pollution.","Ecological integrity: vegetation quality, indicator species and structure.","Counts number of positive indicator species in semi‑natural rough grazing.","Assesses cover of all positive indicator species, reflecting quality and richness of rough grazing.","Measures combined cover of negative indicators\u002fweeds that signal enrichment or mismanagement.","Evaluates vegetation structure in grazed rough grassland, including tussocks, varied heights and micro‑habitats.","Evaluates vegetation structure where rough grazing is cut, including field margins, headlands and aftermath.","Assesses Marsh Fritillary suitability using Devil’s‑bit Scabious distribution and structure.","Scores field boundary quality for rough grazing fields (hedges, walls, ditches, treelines).","Assesses scrub diversity and structure, including mix of woody species and height variation across the field.","Hydrological integrity: water features, drainage and wetland function.","Records evidence of damaging activities such as burning, quarrying or dumping in rough grazing areas.","Rates risk to water from rough grazing management, including run‑off and poaching near water bodies.","Assesses bare soil and erosion caused by livestock, vehicles or con
