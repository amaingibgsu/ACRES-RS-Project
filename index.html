<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplementary Material S2: ACRES RS Suitability Matrix</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f4f7f6; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        p { color: #555; margin-bottom: 30px; font-size: 14px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 10px; margin-top: 10px; font-size: 20px; }
        .card-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 40px; overflow: hidden; }
        table { font-size: 0.85em; width: 100% !important; }
        th { background-color: #27ae60 !important; color: white !important; text-transform: uppercase; font-weight: 600; }
        td { max-width: 300px; white-space: normal !important; word-wrap: break-word; vertical-align: top; }
        .dataTables_wrapper { padding-top: 10px; }
    </style>
</head>
<body>

    <h1>Supplementary Material S2: ACRES RS Suitability Matrix</h1>
    <p>Data synchronized directly from your live <strong>EI_ACRES matrix_March_Journal_2026.xlsx</strong> workbook. Use filters to query columns instantly.</p>

    <div id="tables-container">
        <p style="text-align: center; color: #7f8c8d;">Reading Excel workbook data...</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script>
        const workbookPath = "EI_ACRES matrix_March_Journal_2026.xlsx";

        fetch(workbookPath)
            .then(response => response.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(data, { type: "array" });
                const container = document.getElementById('tables-container');
                container.innerHTML = "";

                if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
                    container.innerHTML = "<p>No worksheets found in the Excel workbook.</p>";
                    return;
                }

                workbook.SheetNames.forEach(sheetName => {
                    const worksheet = workbook.Sheets[sheetName];

                    const section = document.createElement('div');
                    section.className = 'card-box';
                    section.innerHTML = `<h2>${sheetName}</h2>`;

                    // SPECIAL CASE: References sheet(s) – render as HTML directly
                    if (sheetName.toLowerCase().includes("reference")) {
                        const htmlTable = XLSX.utils.sheet_to_html(worksheet);
                        if (!htmlTable || htmlTable.trim() === "") {
                            section.innerHTML += "<p>This worksheet is empty.</p>";
                        } else {
                            section.innerHTML += htmlTable;
                        }
                        container.appendChild(section);
                        return;
                    }

                    // Default case: matrix-type sheet → DataTables
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                    if (jsonData.length === 0) {
                        section.innerHTML += "<p>This worksheet is empty.</p>";
                        container.appendChild(section);
                        return;
                    }

                    const table = document.createElement('table');
                    table.className = 'display nowrap responsive';
                    table.style.width = "100%";

                    section.appendChild(table);
                    container.appendChild(section);

                    const columnsConfig = Object.keys(jsonData[0]).map(key => ({
                        title: key,
                        data: key,
                        defaultContent: "<em>-</em>"
                    }));

                    $(table).DataTable({
                        data: jsonData,
                        columns: columnsConfig,
                        responsive: true,
                        pageLength: 10,
                        searching: true,
                        ordering: true,
                        lengthChange: false,
                        order: []
                    });
                });
            })
            .catch(error => {
                document.getElementById('tables-container').innerHTML =
                    `<p style="color:red;">Error loading Excel workbook content.</p>`;
                console.error(error);
            });
    </script>
</body>
</html>
